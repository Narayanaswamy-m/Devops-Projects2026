- name: config rabbitmq 
  hosts: rabbitmq
  become: yes 
  tasks:
  - name: copy the rabbitmq repo content
    ansible.builtin.copy:
      src: /rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo
      
  - name: Install RabbitMQ
    ansible.builtin.dnf:
      name: rabbitmq-server
      state: present 
  - name: Start RabbitMQ 
    ansible.builtin.service:
      name: rabbitmq-server
      state: restarted
      enabled: yes 
  - name: create rabbitmq user 
    community.rabbitmq.rabbitmq_user:
      user: roboshop
      password: roboshop123
    permissions:
      - vhost: /
        configure_priv: .*
        read_priv: .*
        write_priv: .*
    state: present
           