- name: create ec2 and route53
  hosts: all
  connection: local 
  vars:
    sg_id:  sg-026eda32a5a9ca5d0
    ami_id: ami-0220d79f3f480ecf5
    env: dev
    domain_name: swamy.sbs
    action: create
    instances:
    - mongodb
    - catalogue

  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        project: roboshop
        component: "{{ item }}"
        Environment: " {{ env }}"
        Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}" 
      register: ec2_output
      when: action == "create"
  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
    when: action == "create"    
  - name: create route 53 record 
    amazon.aws.route53:
    state: present
    zone: "{{ domain_name }}"
    record: "{{ item.item}}-{{ env }}.{{ domain_name}}"
    type: A
    ttl: 1
    value: "{{ item.instances[0].private_ip_address }}"
    wait: false
    overwrite: true 
    loop: "{{ ec2_output.results }}" # list
    when: action == "create"



      